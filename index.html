<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kimoiran's Website</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        body {
            background-image: url('24.jpg');
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center center;
            color: white; /* 默认文本颜色 */
            font-family: Arial, sans-serif; /* 字体样式 */
        }

        #currentDateTime {
            color: white; /* 当前时间的颜色 */
        }

        p {
            font-size: 2em; /* 段落字体大小 */
        }

        .center-img-container {
            text-align: center;
        }

        .parent-element {
            text-align: center;
        }

        #myTitle {
            color: #FF00FF; /* 标题颜色 */
        }

        a:link, a:visited {
            color: #BBFFFF;
        }

        a:hover {
            color: #ff6600;
        }

        a:active {
            color: #0099ff;
        }

        .bing-search-container {
            text-align: center;
            margin-top: 20px;
        }

        .bing-search-container form {
            display: inline-flex;
            align-items: center;
            border: 1px solid #ccc;
            border-radius: 20px;
            overflow: hidden;
            background-color: rgba(255, 255, 255, 0.1);
        }

        .bing-search-container input[type="text"] {
            width: 200px;
            padding: 8px 12px;
            font-size: 14px;
            border: none;
            outline: none;
            background-color: white;
            color: white;
        }

        .bing-search-container input[type="submit"] {
            padding: 8px 16px;
            font-size: 14px;
            border: none;
            background-color: #0078D7;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .bing-search-container input[type="submit"]:hover {
            background-color: #005A9E;
        }
    </style>
</head>
<body>
    <div style="text-align: center;" id="currentDateTime">当前时间将在這裡显示...</div>
    <div>
        Form Kimoiran
    </div>
    <h1 id="myTitle" style="text-align: center;">Welcome to Kimoiran's Website</h1>

    <!-- Bing 搜索框 -->
    <div class="bing-search-container">
        <form action="https://www.bing.com/search" method="get">
            <input type="text" name="q" placeholder="搜索 Bing...">
            <input type="submit" value="搜索">
        </form>
    </div>

    <div class="parent-element">

    </div>

    </div>
    <br>
    <div class="parent-element">
        <a href="https://www.csust.edu.cn/">长沙理工大学</a>
    </div>
    <br>
    <div class="parent-element">
        <a href="https://www.qidian.com/all/">起点中文网</a>
    </div>
    <br>
    <div class="parent-element">

    </div>
    <br>

    </div>
    <br>
    <script>
        function displayDateTime() {
            var now = new Date();
            var dayOfWeek = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"][now.getDay()];
            var year = now.getFullYear();
            var month = ("0" + (now.getMonth() + 1)).slice(-2); // 获取月份并补零
            var date = ("0" + now.getDate()).slice(-2); // 获取日期并补零
            var hours = ("0" + now.getHours()).slice(-2);
            var minutes = ("0" + now.getMinutes()).slice(-2);
            var seconds = ("0" + now.getSeconds()).slice(-2);

            var formattedDateTime = dayOfWeek + "，" + year + "年" + month + "月" + date + "日 " + hours + "时" + minutes + "分" + seconds + "秒";

            document.getElementById("currentDateTime").innerHTML = formattedDateTime;
        }

        setInterval(displayDateTime, 1000); // 每隔一秒更新一次
    </script>
</body>
</html>
