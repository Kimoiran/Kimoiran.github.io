<!DOCTYPE html>
<html lang="en">
<meta charset="UTF-8">

<script>
    function displayDateTime() {
        var now = new Date();
        var dayOfWeek = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"][now.getDay()];
        var year = now.getFullYear();
        var month = ("0" + (now.getMonth() + 1)).slice(-2); // 获取月份并补零
        var date = ("0" + now.getDate()).slice(-2); // 获取日期并补零
        var hours = ("0" + now.getHours()).slice(-2);
        var minutes = ("0" + now.getMinutes()).slice(-2);
        var seconds = ("0" + now.getSeconds()).slice(-2);

        var formattedDateTime = dayOfWeek + "，" + year + "年" + month + "月" + date + "日 " + hours + "时" + minutes + "分" + seconds + "秒";

        document.getElementById("currentDateTime").innerHTML = formattedDateTime;
    }

    setInterval(displayDateTime, 1000); // 每隔一秒更新一次
</script>
